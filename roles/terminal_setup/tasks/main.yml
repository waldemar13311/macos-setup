---
- name: Silence login messages (hushlogin)
  ansible.builtin.file:
    path: "{{ [ansible_user_dir, '.hushlogin'] | path_join }}"
    state: touch
    mode: '0644'
    owner: "{{ ansible_user_id }}"
    modification_time: preserve
    access_time: preserve

- name: Configure Vim
  ansible.builtin.include_tasks: vim_setup.ansible.yml

- name: Configure git
  ansible.builtin.include_tasks: git_setup.ansible.yml

- name: Configure terraform
  ansible.builtin.include_tasks: terraform_setup.ansible.yml

- name: Find all zcompdump files
  ansible.builtin.find:
    paths: "{{ ansible_user_dir }}"
    depth: 5
    patterns: ".zcompdump*"
    recurse: true
    file_type: file
  register: found_zcompdump_files

- name: Remove found zcompdump files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ found_zcompdump_files.files }}"

- name: Install antidote (macOS)
  ansible.builtin.package:
    name: antidote
    use: homebrew
    state: present

- name: Install console utilities (macOS)
  ansible.builtin.package:
    name: "{{ terminal_setup_modern_console_utils + terminal_setup_console_utils }}"
    use: homebrew
    state: present

- name: Ensure zsh XDG directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ terminal_setup_config_dir }}"
    - "{{ terminal_setup_cache_dir }}"
    - "{{ terminal_setup_state_dir }}"
    - "{{ terminal_setup_data_dir }}"

- name: Deploy .zshenv to the HOME (the XDG anchor)
  ansible.builtin.copy:
    src: .zshenv
    dest: "{{ [ansible_user_dir, '.zshenv'] | path_join }}"
    mode: '0644'

- name: Create .zsh_plugins.txt from template ({{ [terminal_setup_config_dir, '.zsh_plugins.txt'] | path_join }})
  ansible.builtin.copy:
    dest: "{{ [terminal_setup_config_dir, '.zsh_plugins.txt'] | path_join }}"
    content: "{{ terminal_setup_zsh_plugins | join('\n') }}\n"
    mode: "0644"
    owner: "{{ ansible_user_id }}"
  notify: Initialize Antidote plugins

- name: Copy zsh configs to ~/.config/zsh
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ [terminal_setup_config_dir, item] | path_join }}"
    mode: "0644"
    owner: "{{ ansible_user_id }}"
  loop: "{{ terminal_setup_zsh_config_files }}"
  notify: Initialize Antidote plugins

- name: Move old .zsh_history file to XDG directory
  ansible.builtin.command: mv "{{ [ansible_user_dir, '.zsh_history'] | path_join }}" "{{ [terminal_setup_state_dir, 'history'] | path_join }}"
  args:
    creates: "{{ [terminal_setup_state_dir, 'history'] | path_join }}"
    removes: "{{ [ansible_user_dir, '.zsh_history'] | path_join }}"
  failed_when: false

- name: Create local Zsh completion directory
  ansible.builtin.file:
    path: "{{ [terminal_setup_config_dir, 'completion'] | path_join }}"
    state: directory
    mode: "0755"

- name: Configure Docker and generate completions
  ansible.builtin.include_tasks: docker_setup.ansible.yml
